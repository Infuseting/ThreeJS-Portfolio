<!doctype html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <title>3D Pinball for Windows - Space Cadet</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        canvas.emscripten {
            margin: 0;
            padding: 0;
            border: 0 none;
            display: block;
            outline: none;
            image-rendering: auto;
            width: 600px !important;
            height: 416px !important;
        }

        #status {
            color: #fff;
            font-family: monospace;
            padding: 10px;
        }

        .audio-controls {
            position: absolute;
            top: 5px;
            left: 5px;
            z-index: 1000;
        }

        .audio-controls button {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .audio-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="emscripten" id="status">Downloading...</div>
    <div class="emscripten">
        <progress hidden id="progress" max="100" value="0"></progress>
    </div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" style="display:none"
        tabindex="-1"></canvas>
    <script>
        var statusElement = document.getElementById("status");
        var progressElement = document.getElementById("progress");
        var Module = {
            preRun: [],
            postRun: [],
            print: function () {
                var e = document.getElementById("output");
                return e && (e.value = ""), function (e) {
                    arguments.length > 1 && (e = Array.prototype.slice.call(arguments).join(" ")), console.log(e)
                }
            }(),
            printErr: function (e) {
                arguments.length > 1 && (e = Array.prototype.slice.call(arguments).join(" ")), console.error(e)
            },
            canvas: function () {
                var e = document.getElementById("canvas");
                return e.addEventListener("webglcontextlost", (function (e) {
                    alert("WebGL context lost. You will need to reload the page."), e.preventDefault()
                }), !1), e
            }(),
            setStatus: function (e) {
                if (Module.setStatus.last || (Module.setStatus.last = { time: Date.now(), text: "" }), e !== Module.setStatus.last.text) {
                    var t = e.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/), n = Date.now();
                    if (!(t && n - Module.setStatus.last.time < 30)) {
                        if (Module.setStatus.last.time = n, Module.setStatus.last.text = e, t) {
                            e = t[1];
                            progressElement.value = 100 * parseInt(t[2]);
                            progressElement.max = 100 * parseInt(t[4]);
                            progressElement.hidden = !1;
                        } else {
                            progressElement.value = null;
                            progressElement.max = null;
                            progressElement.hidden = !0;
                            document.getElementById("canvas").style.display = "block";
                        }
                        statusElement.innerHTML = e;
                        "" === e ? (statusElement.style.display = "none", progressElement.style.display = "none") : (statusElement.style.display = "block", progressElement.style.display = "block")
                    }
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function (e) {
                this.totalDependencies = Math.max(this.totalDependencies, e);
                Module.setStatus(e ? "Preparing... (" + (this.totalDependencies - e) + "/" + this.totalDependencies + ")" : "All downloads complete.")
            }
        };
        Module.setStatus("Downloading...");
        window.onerror = function () {
            Module.setStatus("Exception thrown, see JavaScript console");
            Module.setStatus = function (e) { e && Module.printErr("[post-exception status] " + e) }
        }
    </script>

    <script async src="SpaceCadetPinball.js"></script>
</body>

</html>
